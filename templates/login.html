<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar · {{ MARCA }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <div class="logo">J</div>
      <div>
        <div class="nome">{{ MARCA }}</div>
        <div class="sub">Soluções Empresariais</div>
      </div>
    </div>
    <h1>Acesso à plataforma</h1>
    <p class="desc">Entre com seu e-mail e senha.</p>

    <form id="form" autocomplete="on">
      <div class="form-field">
        <label for="email">E-mail</label>
        <input id="email" type="email" placeholder="seu@email.com.br" autofocus>
      </div>
      <div class="form-field">
        <label for="senha">Senha</label>
        <input id="senha" type="password" placeholder="••••••••">
      </div>
      <button class="btn block" type="submit">Entrar</button>
      <div class="form-erro" id="erro"></div>
    </form>
    <p class="demo-note">Ambiente de demonstração · dados 100% fictícios</p>
  </div>
</div>
<script>
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  const erro = document.getElementById('erro');
  erro.textContent = ''; btn.disabled = true; btn.textContent = 'Entrando…';
  try {
    const r = await fetch('/login', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      credentials: 'same-origin',
      body: JSON.stringify({
        email: document.getElementById('email').value,
        senha: document.getElementById('senha').value,
      })
    });
    const d = await r.json();
    if (d.ok) { location.href = d.redirect; return; }
    erro.textContent = d.error || 'Erro ao entrar.';
  } catch (_) {
    erro.textContent = 'Erro de conexão.';
  }
  btn.disabled = false; btn.textContent = 'Entrar';
});
</script>
</body>
</html>
